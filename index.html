<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>漢字テストメーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700&family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Tokumin:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
<style>
  :root { --accent:#3a7bd5; }
  * { box-sizing: border-box; }
  body { font:14px/1.5 system-ui, "Hiragino Sans", sans-serif; margin:0; color:#222; background:#f6f7f9; }
  header { background:#fff; border-bottom:1px solid #e2e4e8; padding:.8rem 1.2rem; display:flex; align-items:baseline; gap:1rem; }
  header h1 { font-size:1.15rem; margin:0; }
  header .status { font-size:.85rem; color:#777; }
  main { max-width:1100px; margin:1rem auto; padding:0 1rem 3rem; }
  .panel { background:#fff; border:1px solid #e2e4e8; border-radius:8px; padding:1rem; margin-bottom:1rem; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:.6rem 1rem; }
  label { display:block; font-size:.8rem; color:#555; margin-bottom:.15rem; }
  input[type=text], input[type=number], select { width:100%; padding:.35rem .5rem; border:1px solid #ccc; border-radius:5px; font:inherit; }
  textarea { width:100%; min-height:120px; padding:.6rem; border:1px solid #ccc; border-radius:6px; font:15px/1.7 inherit; }
  button { font:inherit; padding:.45rem .9rem; border:0; border-radius:6px; background:var(--accent); color:#fff; cursor:pointer; }
  button.secondary { background:#eef1f5; color:#333; border:1px solid #d4d8de; }
  button:disabled { opacity:.5; cursor:default; }
  .row-actions { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
  table.sheet { width:100%; border-collapse:collapse; }
  table.sheet th, table.sheet td { border-bottom:1px solid #eee; padding:.5rem .4rem; vertical-align:top; text-align:left; }
  table.sheet th { font-size:.78rem; color:#666; font-weight:600; }
  .chips { display:flex; flex-wrap:wrap; gap:.25rem; }
  .chip { border:1px solid #d0d5dc; border-radius:5px; padding:.1rem .35rem; cursor:pointer; user-select:none; background:#fafbfc; }
  .chip.kanji { border-color:#bcd; }
  .chip.st-test { background:var(--accent); color:#fff; border-color:var(--accent); }
  .chip.st-furigana { background:#e8820e; color:#fff; border-color:#e8820e; }
  .chip.st-kana { background:#d8392f; color:#fff; border-color:#d8392f; }
  .chip .rd { display:block; font-size:.7rem; opacity:.85; }
  .chip.st-test .rd input, .chip.st-furigana .rd input, .chip.st-kana .rd input { width:4.5em; font-size:.72rem; border:0; border-bottom:1px solid #fff8; background:transparent; color:#fff; text-align:center; }
  .legend { display:flex; flex-wrap:wrap; gap:.8rem; font-size:.78rem; color:#555; margin-bottom:.5rem; }
  .legend .sw { display:inline-block; width:.85em; height:.85em; border-radius:3px; vertical-align:-1px; margin-right:.25rem; }
  .modebtns button { padding:.2rem .5rem; font-size:.8rem; }
  .modebtns button.on { background:var(--accent); color:#fff; }
  .modebtns button:not(.on) { background:#eef1f5; color:#333; }
  .toolbar { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin-top:.4rem; }
  iframe#preview { width:100%; height:460px; border:1px solid #ddd; border-radius:6px; background:#fff; }
  .muted { color:#888; font-size:.85rem; }
  .kanji-grid { display:flex; flex-wrap:wrap; gap:3px; align-items:center; max-height:320px; overflow:auto; margin-top:.4rem; padding:.2rem; border:1px solid #eee; border-radius:6px; }
  .kanji-grid:empty { display:none; }
  .stroke-label { flex-basis:100%; font-size:.72rem; color:#999; margin:.5rem 0 .1rem; }
  .kcell { display:inline-flex; align-items:center; justify-content:center; width:1.7em; height:1.7em; font-size:1.02rem; border:1px solid #d0d5dc; border-radius:5px; background:#fafbfc; color:#222; cursor:pointer; padding:0; }
  .kcell.sel { background:var(--accent); color:#fff; border-color:var(--accent); }
  #lesson_field { width:100%; padding:.4rem .5rem; border:1px solid #ccc; border-radius:5px; font:1.15rem/1.5 inherit; letter-spacing:.1em; }
  .pick-block { margin:.4rem 0 1rem; }
  .pick-block h4 { margin:.3rem 0; font-size:1rem; border-bottom:2px solid var(--accent); display:inline-block; padding-bottom:.1rem; }
  .pick-block .empty { color:#999; font-size:.85rem; margin:.2rem 0; }
  .sent-row { display:flex; gap:.5rem; align-items:baseline; padding:.18rem .2rem; border-bottom:1px solid #f1f2f4; }
  .sent-row:hover { background:#fafbfc; }
  .sent-row input { margin-top:.3rem; }
  .sent-row label { margin:0; font-size:1.1rem; line-height:1.6; color:#222; cursor:pointer; }
  .k-target { color:var(--accent); font-weight:700; }
  .k-lesson { background:#e7f0fb; border-radius:3px; padding:0 .05em; }
  .k-future { color:#d23; }
</style>
</head>
<body>
<header>
  <h1 data-i18n="appName">漢字テストメーカー</h1>
  <span class="status" id="status"></span>
  <div style="margin-left:auto; display:flex; gap:.5rem; align-items:center">
    <select id="lang_select" class="secondary" data-i18n-title="lang_label" style="padding:.35rem .4rem;border-radius:6px;border:1px solid #d4d8de">
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
    </select>
    <button id="btnSave" class="secondary" data-i18n="save_set">セットを保存</button>
    <button id="btnLoad" class="secondary" data-i18n="load_set">セットを読み込み</button>
    <input type="file" id="loadFile" accept=".json,application/json" style="display:none">
  </div>
</header>

<main>
  <div class="panel">
    <div class="grid">
      <div><label data-i18n="f_class">クラス</label><input type="text" id="h_class" value="小1"></div>
      <div><label data-i18n="f_title">タイトル</label><input type="text" id="h_title" value="こんしゅうのかんじ"></div>
      <div><label data-i18n="f_number">番号</label><input type="text" id="h_lesson" value="1"></div>
      <div><label data-i18n="f_name_label">名前ラベル</label><input type="text" id="h_name" value="なまえ"></div>
      <div><label data-i18n="f_per_page">1ページの文数</label><input type="number" id="o_perpage" value="10" min="1" max="20"></div>
      <div><label data-i18n="f_font_size">文字の大きさ (pt)</label><input type="number" id="o_fontsize" value="18" min="8" max="40"></div>
      <div><label data-i18n="f_box_size">マスの大きさ (mm)</label><input type="number" id="o_boxsize" value="10" min="4" max="20" step="0.5"></div>
      <div>
        <label data-i18n="f_font">フォント</label>
        <select id="o_font">
          <optgroup label="Google Fonts" data-i18n-label="og_google">
            <option value="Klee One" data-i18n="opt_klee">Klee One（おすすめ・手書きふう）</option>
            <option value="LINE Seed JP">LINE Seed JP</option>
            <option value="Zen Kaku Gothic New">Zen Kaku Gothic</option>
            <option value="Zen Maru Gothic" data-i18n="opt_zenmaru">Zen Maru Gothic（丸ゴ）</option>
            <option value="Kaisei Tokumin" data-i18n="opt_kaisei">Kaisei Tokumin（明朝）</option>
            <option value="Yuji Syuku" data-i18n="opt_yuji">Yuji Syuku（筆）</option>
          </optgroup>
          <optgroup label="システム" data-i18n-label="og_system">
            <option value="Hiragino Mincho ProN" data-i18n="opt_hira_mincho">ヒラギノ明朝</option>
            <option value="Hiragino Kaku Gothic ProN" data-i18n="opt_hira_kaku">ヒラギノ角ゴ</option>
            <option value="YuMincho" data-i18n="opt_yumincho">游明朝</option>
            <option value="YuGothic" data-i18n="opt_yugothic">游ゴシック</option>
            <option value="Noto Serif CJK JP">Noto Serif</option>
            <option value="Noto Sans CJK JP">Noto Sans</option>
          </optgroup>
        </select>
      </div>
      <div><label data-i18n="f_font_file">フォントファイル（PDF用）</label><input type="file" id="o_fontfile" accept=".ttf,.otf,.woff,.woff2"></div>
      <div>
        <label data-i18n="f_extras">点数・サイン欄</label>
        <label style="display:flex;align-items:center;gap:.4rem;font-size:.9rem;color:#333"><input type="checkbox" id="o_extras"> <span data-i18n="f_extras_hint">名前の下に追加</span></label>
      </div>
      <div>
        <label data-i18n="f_image">画像（左下）</label>
        <input type="file" id="o_image" accept="image/*">
        <button type="button" id="o_image_clear" class="secondary" data-i18n="btn_image_clear" style="margin-top:.25rem;font-size:.72rem;padding:.18rem .45rem">画像をクリア</button>
      </div>
    </div>
  </div>

  <div class="panel" id="lessonPanel">
    <div class="grid">
      <div>
        <label data-i18n="lbl_pick_grade">学年・JLPT から漢字を選ぶ</label>
        <select id="lesson_grade">
          <option value="" data-i18n="grade_placeholder">— レベルを選ぶ —</option>
          <optgroup label="学年" data-i18n-label="og_school">
            <option value="1" data-i18n="grade_1">小1</option>
            <option value="2" data-i18n="grade_2">小2</option>
            <option value="3" data-i18n="grade_3">小3</option>
            <option value="4" data-i18n="grade_4">小4</option>
            <option value="5" data-i18n="grade_5">小5</option>
            <option value="6" data-i18n="grade_6">小6</option>
            <option value="secondary" data-i18n="grade_secondary">中学以降（常用漢字）</option>
          </optgroup>
          <optgroup label="JLPT" data-i18n-label="og_jlpt">
            <option value="N5">N5</option>
            <option value="N4">N4</option>
            <option value="N3">N3</option>
            <option value="N2">N2</option>
            <option value="N1">N1</option>
          </optgroup>
        </select>
      </div>
    </div>
    <div id="kanji_grid" class="kanji-grid"></div>
    <div style="margin-top:.6rem">
      <label><span data-i18n="lbl_week_kanji">今週の漢字</span> <span id="lesson_count" class="muted"></span> <span data-i18n="hint_week_kanji" class="muted">（表をクリック、または直接入力・追加できます）</span></label>
      <input type="text" id="lesson_field" data-i18n-ph="ph_lesson_field" placeholder="学年を選んで表から選ぶか、ここに漢字を直接入力します（例：花 空 字）">
    </div>
    <div class="toolbar">
      <button id="lesson_find" disabled data-i18n="btn_find">選んだ漢字で例文をさがす</button>
      <button id="lesson_clear" class="secondary" data-i18n="btn_clear">選択をクリア</button>
    </div>
  </div>

  <div class="panel" id="pickerPanel" style="display:none">
    <div class="row-actions">
      <strong data-i18n="lbl_pick_sentences">例文をえらぶ</strong>
      <label style="display:flex;align-items:center;gap:.35rem;margin:0;font-size:.85rem;color:#333">
        <input type="checkbox" id="pick_easyonly" checked> <span data-i18n="chk_easy_only">やさしい文だけ（学年以下の漢字）</span>
      </label>
      <span class="muted" id="pick_summary"></span>
    </div>
    <div id="picker"></div>
    <div class="toolbar">
      <button id="pick_add" data-i18n="btn_add_checked">チェックした文を追加</button>
      <span class="muted" data-i18n="hint_add">チェックした文が下の表に入り、語の選択・読み・書き／読みを調整できます。</span>
    </div>
  </div>

  <div class="panel">
    <label for="input" data-i18n="lbl_paste">文を貼り付け（1行に1文）</label>
    <textarea id="input" placeholder="絵の具で、花の絵をかく。&#10;春休みに、雪がふった。"></textarea>
    <div class="toolbar">
      <button id="process" disabled data-i18n="btn_process">解析する</button>
      <span class="muted" data-i18n="hint_process">漢字の語が自動で選択されます。語をクリックして選択／解除。</span>
    </div>
  </div>

  <div class="panel" id="tablePanel" style="display:none">
    <div class="legend">
      <span data-i18n="legend_intro">語をクリックして切り替え：</span>
      <span><span class="sw" style="background:#fafbfc;border:1px solid #d0d5dc"></span><span data-i18n="legend_plain">そのまま</span></span>
      <span><span class="sw" style="background:#3a7bd5"></span><span data-i18n="legend_test">テスト（マス）</span></span>
      <span><span class="sw" style="background:#e8820e"></span><span data-i18n="legend_furigana">ふりがな</span></span>
      <span><span class="sw" style="background:#d8392f"></span><span data-i18n="legend_kana">ひらがなに置換</span></span>
    </div>
    <table class="sheet">
      <thead><tr><th style="width:90px" data-i18n="th_mode">モード</th><th data-i18n="th_sentence">文（語をクリックで状態を切り替え）</th><th style="width:40px"></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="toolbar">
      <button id="btnPreview" class="secondary" data-i18n="btn_preview">プレビュー更新</button>
      <button id="btnPdf" data-i18n="btn_pdf">PDF を保存</button>
      <button id="btnDocx" data-i18n="btn_docx">Word (.docx) を保存</button>
      <button id="btnSave2" class="secondary" data-i18n="save_set">セットを保存</button>
    </div>
    <div class="toolbar" style="margin-top:.2rem">
      <label style="display:flex;align-items:center;gap:.35rem;margin:0;font-size:.9rem;color:#333">
        <input type="checkbox" id="ans_enable"> <span data-i18n="chk_answer">解答シートも作成する</span>
      </label>
      <span id="ans_buttons" style="display:none">
        <button id="btnPdfAns" data-i18n="btn_pdf_ans">解答 PDF</button>
        <button id="btnDocxAns" data-i18n="btn_docx_ans">解答 Word (.docx)</button>
      </span>
    </div>
  </div>

  <div class="panel" id="previewPanel" style="display:none">
    <label data-i18n="lbl_preview">プレビュー</label>
    <iframe id="preview"></iframe>
  </div>

  <p class="muted" style="margin-top:1.5rem">
    <span data-i18n="footer_kanji_data">漢字データ</span>：<a href="https://www.edrdg.org/wiki/KANJIDIC_Project.html" target="_blank" rel="noopener">KANJIDIC2</a>（EDRDG, CC BY-SA 4.0）／
    <span data-i18n="footer_examples">例文</span>：<a href="https://tatoeba.org/" target="_blank" rel="noopener">Tatoeba</a>（CC BY 2.0 FR）
  </p>
</main>

<script src="vendor/kuromoji.js"></script>
<script src="vendor/docx.umd.js"></script>
<script src="vendor/jszip.min.js"></script>
<script type="module" src="src/app.js?v=2"></script>
</body>
</html>
