<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @page { size: A4 landscape; margin: 12mm; }
  html, body { margin: 0; padding: 0; }
  .sheet {
    writing-mode: vertical-rl;
    text-orientation: upright; /* keep kana/kanji upright in vertical flow */
    font-family: "Hiragino Mincho ProN", "Hiragino Sans", "YuMincho", serif;
    font-size: 20pt;
    line-height: 2.0;
    height: 180mm;
    column-gap: 6mm;
  }
  .title { font-weight: bold; margin-left: 6mm; }
  .s { margin-left: 4mm; }            /* gap between sentences (columns) */
  .num { font-feature-settings: "vert"; }
  /* answer box: one cell per target kanji, square, vertical stack */
  .box {
    display: inline-block;
    inline-size: 1em;                 /* width in vertical = the cell */
    block-size: 1em;                  /* height of one cell */
    border: 1.2px solid #222;
    vertical-align: top;
    box-sizing: content-box;
    margin: 1px 0;
  }
  .box.h2 { block-size: 2em; }        /* tall box for a 2-kanji compound */
  /* small reading mark shown beside the box (furigana-style) */
  ruby { ruby-position: over; }
  rt { font-size: 0.5em; }
  .mark { /* the small vertical tick the sample shows next to a reading */
    border-inline-start: 1px solid #444;
    padding-inline-start: 2px;
  }
</style>
</head>
<body>
  <div class="sheet">
    <span class="title">ＣＥ一　こんしゅうのかん字⑬　名まえ(　　　　)</span>

    <span class="s"><span class="num">①</span> <span class="box"></span>のぐで、はなの<span class="box"></span>を<span class="mark">か</span>く。</span>

    <span class="s"><span class="num">②</span> <span class="box"></span>やすみに、ゆきがふった。</span>

    <span class="s"><span class="num">③</span> <span class="box h2"></span>がきょうしつにかよう。</span>

    <span class="s"><span class="num">⑤</span> <span class="box h2"></span>とぎょうれつのできるレストランにいく。</span>

    <span class="s"><span class="num">⑦</span> ちいさいころの<span class="box"></span>い<span class="box"></span>で。</span>

    <span class="s"><span class="num">⑨</span> まえのほうから、大きないぬをつれた人がやってくる。</span>
  </div>
</body>
</html>
